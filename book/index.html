<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Python для початківців — електронний підручник</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7EF;
    --panel:#FFFFFF;
    --panel-alt:#F2F7FC;
    --surface:#FFFFFF;
    --ink:#26313F;
    --ink-muted:#6C7A8C;
    --rule:#E7EAE2;
    --rule-strong:#D8DECF;
    --primary:#2E7DC0;
    --primary-dark:#1F5E96;
    --primary-tint:#E4F0FA;
    --primary-ink:#FFFFFF;
    --accent:#FFC93C;
    --accent-ink:#4A3600;
    --accent-tint:#FFF4D6;
    --shadow: 0 2px 6px rgba(38,49,63,.06), 0 14px 30px -16px rgba(46,125,192,.35);
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --header-h: 84px;
    --footer-h: 48px;
    --sidebar-w: 336px;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Nunito", sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  ::selection{ background:var(--accent-tint); color:var(--ink); }
  :focus-visible{ outline:3px solid var(--accent); outline-offset:2px; border-radius:6px; }
  a{ color:inherit; }

  /* ---------- Header ---------- */
  .site-header{
    height:var(--header-h);
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:16px;
    padding:0 20px;
    background:var(--panel);
    border-bottom:3px solid var(--primary-tint);
    position:relative;
    z-index:20;
  }
  .menu-toggle{
    display:none;
    width:42px; height:42px;
    border:2px solid var(--rule-strong);
    background:var(--panel-alt);
    border-radius:var(--radius-sm);
    align-items:center; justify-content:center;
    cursor:pointer;
    flex:0 0 auto;
    color:var(--ink);
  }
  .menu-toggle svg{ width:20px; height:20px; }
  .brand{ display:flex; align-items:center; gap:14px; min-width:0; }
  .logo{
    height:auto;
    width:96px;
    object-fit:contain;
    border-radius:var(--radius-sm);
    flex:0 0 auto;
    background:var(--panel-alt);
  }
  .logo:not([src]), .logo.is-broken{ display:none; }
  .header-text{ min-width:0; }
  .eyebrow{
    display:block;
    font-family:"IBM Plex Mono", monospace;
    font-size:.7rem;
    font-weight:600;
    letter-spacing:.06em;
    color:var(--primary-dark);
    margin-bottom:2px;
  }
  .header-text h1{
    margin:0;
    font-family:"Nunito", sans-serif;
    font-weight:900;
    font-size:1.5rem;
    line-height:1.15;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:var(--ink);
  }
  .header-tag{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:8px;
    font-family:"Nunito", sans-serif;
    font-weight:700;
    font-size:.85rem;
    color:var(--primary-dark);
    background:var(--primary-tint);
    border-radius:999px;
    padding:8px 16px;
    white-space:nowrap;
    flex:0 0 auto;
  }

  /* ---------- Layout ---------- */
  .layout{
    flex:1 1 auto;
    display:flex;
    min-height:0;
    position:relative;
  }
  .overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(38,49,63,.35);
    z-index:29;
  }

  /* ---------- Sidebar / TOC ---------- */
  .toc{
    width:var(--sidebar-w);
    flex:0 0 auto;
    background:var(--panel-alt);
    border-right:1px solid var(--rule-strong);
    overflow-y:auto;
    padding:16px 12px 28px;
  }
  .toc-hint{
    font-family:"Nunito", sans-serif;
    font-weight:800;
    font-size:.8rem;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--ink-muted);
    padding:2px 8px 12px;
  }
  .chapter{
    background:var(--surface);
    border:1px solid var(--rule-strong);
    border-radius:var(--radius-md);
    margin-bottom:8px;
    overflow:hidden;
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .chapter:hover{ border-color:var(--primary); }
  .chapter.is-current{ box-shadow:var(--shadow); border-color:var(--primary); }

  .chapter-head{
    width:100%;
    display:flex;
    align-items:center;
    gap:12px;
    padding:11px 12px;
    background:transparent;
    border:0;
    cursor:pointer;
    text-align:left;
    font-family:"Nunito", sans-serif;
    color:var(--ink);
  }
  .lane{
    width:36px; height:36px;
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    font-size:1.15rem;
    background:var(--primary-tint);
    border-radius:var(--radius-sm);
  }
  .chapter.is-current .lane{
    background:var(--primary);
  }
  .chapter-num{
    font-family:"IBM Plex Mono", monospace;
    font-size:.72rem;
    font-weight:600;
    color:var(--ink-muted);
    flex:0 0 auto;
    min-width:16px;
  }
  .chapter-title{
    flex:1 1 auto;
    font-size:.92rem;
    font-weight:700;
    line-height:1.3;
    color:var(--ink);
  }
  .chevron{
    flex:0 0 auto;
    width:16px; height:16px;
    color:var(--ink-muted);
    transition:transform .15s ease;
  }
  .chapter.is-open .chevron{ transform:rotate(90deg); }

  .section-list{
    list-style:none;
    margin:0;
    padding:0 10px 10px 54px;
    display:none;
  }
  .chapter.is-open .section-list{ display:block; }
  .section-list li{ margin:0; }
  .section-link{
    display:block;
    padding:7px 10px;
    margin:2px 0;
    font-size:.86rem;
    font-weight:600;
    line-height:1.35;
    color:var(--ink-muted);
    text-decoration:none;
    border-radius:var(--radius-sm);
  }
  .section-link .num{
    font-family:"IBM Plex Mono", monospace;
    font-size:.76rem;
    font-weight:600;
    color:var(--primary-dark);
    margin-right:6px;
  }
  .section-link:hover{
    background:var(--primary-tint);
    color:var(--ink);
  }
  .section-link.is-active{
    background:var(--accent);
    color:var(--accent-ink);
  }
  .section-link.is-active .num{ color:var(--accent-ink); }

  /* ---------- Viewer ---------- */
  .viewer{
    flex:1 1 auto;
    min-width:0;
    padding:22px;
    display:flex;
  }
  .viewer iframe{
    flex:1 1 auto;
    width:100%;
    height:100%;
    border:1px solid var(--rule-strong);
    border-radius:var(--radius-lg);
    background:var(--surface);
    box-shadow:var(--shadow);
  }

  /* ---------- Footer ---------- */
  .site-footer{
    flex:0 0 auto;
    min-height:var(--footer-h);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:8px 22px;
    background:var(--panel);
    border-top:1px solid var(--rule-strong);
    font-family:"IBM Plex Mono", monospace;
    font-size:.72rem;
    color:var(--ink-muted);
  }
  .site-footer a{ color:var(--primary-dark); }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px){
    .menu-toggle{ display:flex; }
    .header-text h1{ font-size:1.15rem; }
    .logo{ height:40px; width:40px; }
    .toc{
      position:fixed;
      top:var(--header-h);
      bottom:0;
      left:0;
      width:min(88vw, 360px);
      transform:translateX(-100%);
      transition:transform .22s ease;
      z-index:30;
      box-shadow:var(--shadow);
    }
    .toc.is-open{ transform:translateX(0); }
    .overlay.is-open{ display:block; }
    .viewer{ padding:12px; }
    .header-tag{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .toc, .chevron, .chapter{ transition:none; }
  }
</style>
</head>

    </button>
    <div class="brand">

  function slugify(text){
    return text
      .toLowerCase()
      .replace(/[^\p{L}\p{N}\s-]/gu, '')
      .trim()
      .replace(/\s+/g, '-');
  }

  const toc = document.getElementById('toc');
  const frame = document.getElementById('viewerFrame');
  const headerTag = document.getElementById('headerTag');
  const menuToggle = document.getElementById('menuToggle');
  const overlay = document.getElementById('overlay');
  const logoImg = document.getElementById('logoImg');

  logoImg.addEventListener('error', () => logoImg.classList.add('is-broken'));

  function closeMobileMenu(){
    toc.classList.remove('is-open');
    overlay.classList.remove('is-open');
    menuToggle.setAttribute('aria-expanded', 'false');
  }

  function setActiveSection(linkEl){
    toc.querySelectorAll('.section-link.is-active').forEach(el => el.classList.remove('is-active'));
    if (linkEl) linkEl.classList.add('is-active');
  }

  function updateHeaderTag(emoji, num){
    headerTag.innerHTML = `${emoji} Розділ <span>${num}</span>`;
  }

  function goToChapterRoot(num, emoji){
    frame.src = `ch${num}.html`;
    updateHeaderTag(emoji, num);
    setActiveSection(null);
  }

  function goToSection(num, emoji, file, hash, linkEl){
    frame.src = `${file}#${hash}`;
    updateHeaderTag(emoji, num);
    setActiveSection(linkEl);
  }

  function buildToc(){
    CHAPTERS.forEach(([num, title, emoji, sections], idx) => {
      const chapterEl = document.createElement('div');
      chapterEl.className = 'chapter';
      chapterEl.dataset.chapter = num;
      if (idx === 0) chapterEl.classList.add('is-open', 'is-current');

      const head = document.createElement('button');
      head.type = 'button';
      head.className = 'chapter-head';
      head.setAttribute('aria-expanded', idx === 0 ? 'true' : 'false');
      head.innerHTML = `
        <span class="lane">${emoji}</span>
        <span class="chapter-num">${num}</span>
        <span class="chapter-title">${title}</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      `;

      const list = document.createElement('ul');
      list.className = 'section-list';

      sections.forEach(([secNum, secTitle]) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.className = 'section-link';
        const hash = slugify(`${secNum} ${secTitle}`);
        a.innerHTML = `<span class="num">${secNum}</span>${secTitle}`;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.chapter').forEach(c => c.classList.remove('is-current'));
          chapterEl.classList.add('is-current');
          goToSection(num, emoji, `ch${num}.html`, hash, a);
          closeMobileMenu();
        });
        li.appendChild(a);
        list.appendChild(li);
      });

      head.addEventListener('click', () => {
        const willOpen = !chapterEl.classList.contains('is-open');
        chapterEl.classList.toggle('is-open', willOpen);
        head.setAttribute('aria-expanded', String(willOpen));
        document.querySelectorAll('.chapter').forEach(c => c.classList.remove('is-current'));
        chapterEl.classList.add('is-current');
        goToChapterRoot(num, emoji);
      });

      chapterEl.appendChild(head);
      chapterEl.appendChild(list);
      toc.appendChild(chapterEl);
    });
  }

  buildToc();

  menuToggle.addEventListener('click', () => {
    const willOpen = !toc.classList.contains('is-open');
    toc.classList.toggle('is-open', willOpen);
    overlay.classList.toggle('is-open', willOpen);
    menuToggle.setAttribute('aria-expanded', String(willOpen));
  });
  overlay.addEventListener('click', closeMobileMenu);

  document.getElementById('footerYear').textContent = `© ${new Date().getFullYear()}`;
</script>
